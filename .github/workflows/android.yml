name: Build Mobile APK

# Builds the DrawMeBinary Android scanner (mobile/) in the cloud and publishes
# an installable debug APK. Open the "mobile-latest" release on your phone and
# tap the .apk to install (allow "install unknown apps").

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:        # lets you trigger a build by hand from the Actions tab

permissions:
  contents: write           # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: mobile
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drawmebinary-debug-apk
          path: mobile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to a rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: DrawMeBinary mobile — debug APK (latest)
          body: |
            Latest debug build of the DrawMeBinary Android scanner (Milestone 1: live camera preview).

            **Install on your phone:** open this page on the phone, tap `app-debug.apk`,
            and allow "install from unknown sources" when prompted. Requires Android 7.0+.
          files: mobile/app/build/outputs/apk/debug/app-debug.apk
